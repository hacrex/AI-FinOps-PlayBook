# Jekyll configuration for GitHub Pages with Cayman theme
# Reference: https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/adding-a-theme-to-your-github-pages-site-using-jekyll

title: AI FinOps Overview
description: Comprehensive guide to AI FinOps practices, tools, and strategies
baseurl: "" # Change this if your site is in a subdirectory (e.g., "/repo-name")
url: "" # Your base URL (e.g., "https://username.github.io")

# Theme configuration - Using Cayman theme gem for GitHub Actions deployment
theme: jekyll-theme-cayman

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Optional: Site author
author:
  name: ""
  url: ""

# Exclude files from build
exclude:
  - CONTRIBUTING.md
  - LICENSE
  - IMPLEMENTATION_SUMMARY.md
  - "*.svg"
  - ".gitignore"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Use GitHub Flavored Markdown rendering
kramdown:
  input: GFM
